# Name of your application. Used to uniquely configure containers.
service: advance_fitness_app

# Name of the container image (use your-user/app-name on external registries).
image: advance_fitness_app

# Deploy to these servers.
servers:
  web:
    hosts:
      - 192.168.40.253
    # Sin puertos públicos: el servidor ya se expone con un túnel nombrado de
    # Cloudflare (docker-lab/docker-compose.yml, contenedor "cloudflared") que
    # apunta a http://rails-app:80 en la red docker "docker-lab_proxy-network".
    # Nos unimos a esa misma red con el mismo alias en vez de levantar
    # kamal-proxy (que necesitaría los puertos 80/443 del host).
    proxy: false
    options:
      network: docker-lab_proxy-network
      network-alias: rails-app

# Sin kamal-proxy (ver servers.web.proxy: false arriba) — el túnel de
# Cloudflare ya termina SSL y enruta por nombre de contenedor.

# Default (30s) es más corto que el read_timeout de la IA (120s, ver
# app/services/ia/*): un deploy durante una generación en curso mataba el
# contenedor viejo a mitad de camino y dejaba el plan en "generando" para
# siempre (ver LiberarPlanesEstancadosJob, que además cubre cualquier otro
# caso de worker muerto sin este margen).
drain_timeout: 130

# Where you keep your container images.
registry:
  # "localhost:<puerto>" es un caso especial de Kamal ("registro local", sin
  # auth): levanta un registry temporal en la máquina donde corre `bin/kamal`
  # (esta Mac) y abre un túnel SSH inverso para que el builder remoto y el
  # propio servidor lo alcancen — así funciona el patrón oficial de build
  # remoto (builder.remote) para compilar amd64 desde una Mac arm64.
  server: localhost:5555

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - GEMINI_API_KEY
    - IA_PROVEEDOR
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    # When you start using multiple servers, you should split out job processing to a dedicated machine.
    SOLID_QUEUE_IN_PUMA: true

    # Set number of processes dedicated to Solid Queue (default: 1)
    # JOB_CONCURRENCY: 3

    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and local Active Storage files.
# Recommended to change this to a mounted volume path that is backed up off server.
volumes:
  - "advance_fitness_app_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # Build en el propio servidor (x86_64) en vez de en esta Mac (arm64): evita
  # emulación QEMU lenta y usa el builder buildx que ya estaba provisionado
  # ahí (kamal-local-registry), junto al registry local en localhost:5555.
  remote: ssh://ynt@192.168.40.253

# Usuario no-root con acceso al grupo docker en el servidor.
ssh:
  user: ynt

