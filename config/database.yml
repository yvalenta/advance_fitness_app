# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # "pool" (no "max_connections", que ActiveRecord ignora): con 4 bases
  # lógicas (primary/cache/queue/cable) compartiendo la MISMA base física de
  # Supabase, cada una abre su propio pool — con el default de 5 se llega a
  # 20 conexiones por proceso, superando el límite de 15 del pooler en modo
  # sesión (puerto 5432) y dejando trabajos "atascados" cuando ni siquiera
  # alcanza a guardarse el estado de fallo (julio 2026).
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 3).to_i %>


development:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
# url explícita: evita que DATABASE_URL (Supabase, desarrollo) tenga
# precedencia y los tests intenten purgar la base de desarrollo.
test:
  <<: *default
  url: <%= ENV.fetch("TEST_DATABASE_URL", "postgresql://localhost/advance_fitness_app_test") %>

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Connection URLs for non-primary databases can also be configured using
# environment variables. The variable name is formed by concatenating the
# connection name with `_DATABASE_URL`. For example:
#
#   CACHE_DATABASE_URL="postgres://cacheuser:cachepass@localhost/cachedatabase"
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
production:
  # Con varias bases lógicas (primary/cache/queue/cable), Rails NO aplica
  # DATABASE_URL a menos que cada una lo declare explícitamente (ver
  # comentario arriba). Todas comparten la misma base física de Supabase.
  #
  # "queue" necesita su propio pool más grande: Solid Queue (supervisor +
  # workers + dispatcher + scheduler, todo dentro del mismo proceso Puma vía
  # SOLID_QUEUE_IN_PUMA) exige internamente threads_de_worker + dispatcher +
  # scheduler conexiones simultáneas (con config/queue.yml por defecto, 5) y
  # aborta el boot si el pool es menor — no basta con el "pool" genérico de
  # 3 hilos de Puma. cache/cable casi no se usan aquí, con 2 sobra.
  # idle_timeout corto (default 300s): las conexiones ociosas vuelven al
  # pooler de sesión de Supabase (límite 15 clientes) mucho antes — cache y
  # cable casi no se usan y quedaban reteniendo sus conexiones toda la vida
  # del proceso, agotando el pooler durante los deploys (julio 2026).
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    idle_timeout: 60
  cache:
    <<: *primary_production
    pool: 2
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    pool: <%= ENV.fetch("QUEUE_DATABASE_POOL", 6).to_i %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    pool: 2
    migrations_paths: db/cable_migrate
