x-app: &app
  build:
    context: .
    dockerfile: Dockerfile.dev
  volumes:
    - .:/rails
    - bundle:/usr/local/bundle
  environment:
    # Dentro de los contenedores manda el Postgres del compose; el
    # DATABASE_URL de Supabase del .env queda para producción/host.
    DATABASE_URL: postgres://postgres:postgres@db:5432/advance_fitness_app_development
    TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/advance_fitness_app_test
    # GenerarPlanJob (Fase 5): compose la toma del .env del host si existe
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  depends_on:
    db:
      condition: service_healthy
  tmpfs:
    - /rails/tmp/pids

services:
  web:
    <<: *app
    command: bin/dev
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bundle:
  postgres:
