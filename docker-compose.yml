x-app: &app
  build:
    context: .
    dockerfile: Dockerfile.dev
  volumes:
    - .:/rails
    - bundle:/usr/local/bundle
  environment:
    # Base de desarrollo: por defecto el Postgres del compose. Si en .env se
    # define DEV_DATABASE_URL (p. ej. el pooler de Supabase de producción),
    # los contenedores apuntan allá. ⚠️ Con Supabase activo NO correr
    # db:drop / db:reset / dip provision. Los tests SIEMPRE van a la base local.
    DATABASE_URL: ${DEV_DATABASE_URL:-postgres://postgres:postgres@db:5432/advance_fitness_app_development}
    TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/advance_fitness_app_test
    # GenerarPlanJob (Fase 5): compose las toma del .env del host si existen
    IA_PROVEEDOR: ${IA_PROVEEDOR:-}
    GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    GEMINI_MODELO: ${GEMINI_MODELO:-}
    GEMINI_MODELO_FALLBACK: ${GEMINI_MODELO_FALLBACK:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    CLAUDE_MODELO: ${CLAUDE_MODELO:-}
    # Negocio (parametrizable para clonar a otro gimnasio)
    NEGOCIO_NOMBRE: ${NEGOCIO_NOMBRE:-}
    PRECIO_MENSUALIDAD: ${PRECIO_MENSUALIDAD:-}
    PRECIO_PERSONALIZADO: ${PRECIO_PERSONALIZADO:-}
    MEMBRESIA_DURACION_DIAS: ${MEMBRESIA_DURACION_DIAS:-}
  depends_on:
    db:
      condition: service_healthy
  tmpfs:
    - /rails/tmp/pids

services:
  web:
    <<: *app
    command: bin/dev
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bundle:
  postgres:
